<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tools</title>

  <!-- Web App Manifest for PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- Meta tags for home screen -->
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Simple tools for meditation, stretching, breathing, workouts, and screen awake control" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="My Tools" />
  <link rel="apple-touch-icon" href="icon-192.svg" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #111827, #0f172a);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 18px; padding-top: 6px; }
    .header h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .header p { color: #cbd5e1; font-size: 0.85rem; }

    /* App grid (mobile home-screen style) */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 12px;
      align-items: start;
      justify-items: center;
      padding: 6px 4px;
    }

    .app-tile {
      width: 72px;
      height: 96px;
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      border-radius: 12px;
      transition: transform 160ms ease, background 160ms ease;
      padding-top: 6px;
    }

    .app-tile:active, .app-tile:focus, .app-tile:hover { transform: translateY(-4px); }

    .app-icon {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      backdrop-filter: blur(6px);
    }

    .app-label {
      font-size: 12px;
      text-align: center;
      color: #e6eef8;
      line-height: 1.1;
      max-width: 72px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer { margin-top: 22px; text-align: center; color: #94a3b8; font-size: 0.8rem; }

    @media (min-width: 700px) {
      .tools-grid { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 18px; }
      .app-tile { width: 100px; height: 120px; }
      .app-icon { width: 72px; height: 72px; font-size: 36px; }
      .app-label { font-size: 13px; }
      .header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <h1>My Tools</h1>
      <p>Version :2/6/26 </p>
      <p>Simple tools for meditation, stretching, breathing, workouts, and screen awake control.</p>
    </div>

    <div class="tools-grid">

      <a href="meditation/" class="app-tile" aria-label="Meditation Timer">
        <div class="app-icon">🧘</div>
        <div class="app-label">Meditation</div>
      </a>

      <a href="stretching/" class="app-tile" aria-label="Stretching Tool">
        <div class="app-icon">🤸</div>
        <div class="app-label">Stretching</div>
      </a>

      <a href="breathing/" class="app-tile" aria-label="Breathing Trainer">
        <div class="app-icon">🌬️</div>
        <div class="app-label">Breathing</div>
      </a>

      <a href="keep-screen-awake/" class="app-tile" aria-label="Screen Awake">
        <div class="app-icon">🔆</div>
        <div class="app-label">Screen Awake</div>
      </a>

      <a href="exercise/" class="app-tile" aria-label="Exercise Timer">
        <div class="app-icon">💪</div>
        <div class="app-label">Exercise</div>
      </a>

    </div>

    <div class="footer">
      Built by Rahul Somani.
    </div>

  </div>

</body>
</html>
