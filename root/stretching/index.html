<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=0" />
  <title>Stretching Planner Pro</title>
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
      --text: #f1f5f9; --muted: #94a3b8; --border: rgba(255,255,255,0.1);
      --prep: #facc15; --success: #22c55e; --rest: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text); margin: 0; padding: 15px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    
    /* Global App Header */
    .app-header { margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px; }
    .app-header h1 { margin: 0; font-size: 1.6rem; color: var(--text); }
    .app-header a { color: var(--accent); text-decoration: none; font-size: 0.95rem; font-weight: 600; display: inline-block; transition: 0.2s;}
    .app-header a:hover { opacity: 0.8; text-decoration: underline; }

    .panel { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
    
    /* App Navigation Tabs */
    .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); transition: 0.2s; font-size: 0.95rem; }
    .tab-btn.active { background: var(--accent); color: #0f172a; }
    
    /* View Toggles */
    .view-section { display: none; }
    .view-section.active { display: block; }

    /* Category Rows */
    .category-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .category-row:last-child { border-bottom: none; }
    .cat-label { font-weight: 600; font-size: 0.95rem; }
    .cat-chips { display: flex; gap: 8px; }
    
    .chip {
      background: #334155; padding: 6px 14px; border-radius: 20px;
      cursor: pointer; font-size: 0.8rem; font-weight: 600; user-select: none; transition: 0.2s;
      border: 1px solid transparent; color: var(--muted);
    }
    .chip:hover { background: #475569; }
    .chip.active { background: var(--accent); color: #0f172a; border-color: white; }

    /* Stats Dashboard */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; text-align: center; }
    .stat-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; display: block; }
    .stat-value { font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums; }

    /* Timer Styles */
    .timer-display { text-align: center; max-width: 600px; margin: 0 auto; }
    .current-name { font-size: 1.6rem; font-weight: 700; color: var(--text); display: block; }
    .current-desc { font-size: 0.95rem; color: var(--muted); margin: 8px auto 15px; min-height: 2.5em; max-width: 95%; line-height: 1.4; }
    .current-time { font-size: 6rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--accent); margin: 5px 0; line-height: 1; }
    
    /* Dynamic Timer Colors */
    .is-preparing .current-time { color: var(--prep); }
    .is-preparing .current-name { color: var(--prep); }
    .is-resting .current-time { color: var(--rest); }
    .is-resting .current-name { color: var(--rest); }
    
    .progress-container { height: 12px; background: #334155; border-radius: 6px; overflow: hidden; margin-bottom: 25px; }
    #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s linear; }
    .is-preparing #progressBar { background: var(--prep); }
    .is-resting #progressBar { background: var(--rest); }

    /* Upcoming Highlight */
    .upcoming-box {
      background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3);
      color: var(--accent); padding: 15px; border-radius: 8px; margin-bottom: 25px;
      font-size: 1rem; font-weight: 600; text-align: center;
    }

    .audio-settings { 
      display: flex; flex-direction: column; gap: 12px; 
      margin-bottom: 25px; font-size: 0.9rem; color: var(--muted); 
      background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
    }
    .audio-row { display: flex; justify-content: space-between; align-items: center; }
    select { background: #0f172a; color: white; border: 1px solid var(--border); padding: 5px; border-radius: 4px; outline: none; }
    
    /* Volume Lock Styling */
    .vol-control-group { display: flex; align-items: center; gap: 8px; }
    .vol-lock-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
    .vol-lock-btn.unlocked { background: rgba(34, 197, 94, 0.15); border-color: var(--success); }
    input[type=range] { width: 120px; accent-color: var(--accent); cursor: pointer; transition: 0.2s; }
    input[type=range]:disabled { opacity: 0.3; cursor: not-allowed; }

    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .controls button { padding: 18px 10px; border-radius: 10px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
    .controls button:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #0f172a; grid-column: span 3; }
    .btn-secondary { background: #475569; color: white; }
    .controls button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Report Queue Styles */
    .queue-list { max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .queue-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.95rem; border-radius: 6px; }
    .queue-item.active { background: rgba(56, 189, 248, 0.15); color: var(--accent); font-weight: 600; border-left: 4px solid var(--accent); }
    .queue-item.done { opacity: 0.3; }

    /* Badges */
    .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-weight: bold; }
    .badge-work { border: 1px solid var(--accent); color: var(--accent); }
    .badge-rest { border: 1px solid var(--rest); color: var(--rest); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
  </style>
</head>
<body>

<div class="container">
  
  <div class="app-header">
    <a href="../">← Back to tools</a>
    <h1>Stretching Planner Pro</h1>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tabSetupBtn" onclick="switchTab('setup')">⚙️ Setup Routine</button>
    <button class="tab-btn" id="tabWorkoutBtn" onclick="switchTab('workout')">🧘 Active Session</button>
  </div>

  <div id="setupView" class="view-section active">
    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px;">
        <h2 style="margin:0;">Target Areas</h2>
        <span class="muted" style="font-size: 0.8rem;">Mix & match modes</span>
      </div>
      <div id="sectionsList"></div>
    </div>

    <div class="panel">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <div>
          <h3 style="margin:0">Workout Sequence</h3>
          <div id="setupEstTime" class="muted" style="font-size: 0.85rem; font-weight: 600; margin-top: 4px; color: var(--accent);">Total Est. Time: 0:00</div>
        </div>
        <button class="btn-primary" style="padding: 8px 16px; font-size: 0.9rem; grid-column: auto; border-radius: 8px; border:none; font-weight: bold; cursor: pointer; width: auto;" onclick="switchTab('workout')">Go to Timer ➔</button>
      </div>
      <div id="planned" class="queue-list"></div>
    </div>
  </div>

  <div id="workoutView" class="view-section">
    <div class="panel timer-display" id="timerPanel">
      <div class="stats-grid">
        <div class="stat-box">
          <span class="stat-label">Total</span>
          <span class="stat-value" id="statTotal">00:00</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Elapsed</span>
          <span class="stat-value" id="statElapsed">00:00</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Left</span>
          <span class="stat-value" id="statRemaining">00:00</span>
        </div>
      </div>

      <span class="current-name" id="currentName">Select areas to begin</span>
      <div class="current-desc" id="currentDesc">Go to Setup to build your routine.</div>
      
      <div class="current-time" id="currentTime">00:00</div>
      <div class="progress-container"><div id="progressBar"></div></div>

      <div class="upcoming-box" id="upcomingBox">Up Next: --</div>

      <div class="audio-settings">
        <div class="audio-row">
          <span>Sound Cues:</span>
          <select id="soundOption">
            <option value="digital">Digital Beep</option>
            <option value="soft">Soft Sine</option>
            <option value="wood">Percussive</option>
            <option value="none">Mute</option>
          </select>
        </div>
        <div class="audio-row">
          <span>Volume:</span>
          <div class="vol-control-group">
            <button id="volLockBtn" class="vol-lock-btn" aria-label="Unlock Volume">🔒</button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.05" disabled>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn-primary" disabled>START SESSION</button>
        <button id="pauseBtn" class="btn-secondary" disabled>Pause</button>
        <button id="skipBtn" class="btn-secondary" disabled>Skip</button>
        <button id="stopBtn" class="btn-secondary" disabled>Reset</button>
      </div>
    </div>
  </div>
</div>

<script>
  // --- UI Tab Management ---
  function switchTab(tab) {
    document.getElementById('setupView').classList.remove('active');
    document.getElementById('workoutView').classList.remove('active');
    document.getElementById('tabSetupBtn').classList.remove('active');
    document.getElementById('tabWorkoutBtn').classList.remove('active');

    if (tab === 'setup') {
      document.getElementById('setupView').classList.add('active');
      document.getElementById('tabSetupBtn').classList.add('active');
    } else {
      document.getElementById('workoutView').classList.add('active');
      document.getElementById('tabWorkoutBtn').classList.add('active');
    }
  }

  // --- Fully Separated Database (Left/Right explicitly split) ---
  const workoutData = [
    {
      id: 'warmup',
      label: 'Full Body Warmup',

        ["Neck extension stretch", 15, "Gently tilt your head back to look up at the ceiling."],
        ["Neck extension stretch", 15, "Gently tilt your head back to look up at the ceiling."],
        ["Lateral neck stretch - L", 20, "Gently tilt your left ear towards left shoulder."],
        ["Lateral neck stretch - R", 20, "Gently tilt your right ear towards right shoulder."],
        ["Lateral neck stretch - L", 20, "Gently tilt your left ear towards left shoulder."],
        ["Lateral neck stretch - R", 20, "Gently tilt your right ear towards right shoulder."],
        ["Levator scapula stretch - L", 20, "Look down towards left armpit."],
        ["Levator scapula stretch - R", 20, "Look down towards right armpit."],
        ["Levator scapula stretch - L", 20, "Look down towards left armpit."],
        ["Levator scapula stretch - R", 20, "Look down towards right armpit."],
        ["Neck rotations", 40, "Slowly look over left shoulder, then right."],
        ["Chin tucks", 40, "Look straight ahead and pull head back without tilting."]
      ]
    },
    {
      id: 'upper',
      label: 'Shoulders & Chest',
      quick: [
        ["Shoulder CARs", 40, "Make large, slow, controlled circles with your arms."],
        ["Doorway chest stretch - Left", 25, "Place left forearm on doorframe and gently lean forward."],
        ["Doorway chest stretch - Right", 25, "Place right forearm on doorframe and gently lean forward."],
        ["Child's pose with reach", 40, "Kneel, sit back on heels, reach arms far forward."],
        ["Standing side bend - Left", 25, "Reach left arm overhead and lean torso to the right."],
        ["Standing side bend - Right", 25, "Reach right arm overhead and lean torso to the left."]
      ],
      focused: [
        ["Shoulder circles", 40, "Roll shoulders up, back, and down."],
        ["Shoulder CARs", 40, "Make large, slow, controlled circles with arms."],
        ["Rotator cuff stretch - L", 25, "Arm across chest, pull closer with right arm."],
        ["Rotator cuff stretch - R", 25, "Arm across chest, pull closer with left arm."],
        ["Doorway chest stretch - L", 30, "Forearm on doorframe, lean forward."],
        ["Doorway chest stretch - R", 30, "Forearm on doorframe, lean forward."],
        ["Overhead lat stretch - L", 30, "Reach left arm overhead, pull gently with right hand."],
        ["Overhead lat stretch - R", 30, "Reach right arm overhead, pull gently with left hand."],
        ["Standing side bend - L", 25, "Reach left arm overhead and lean right."],
        ["Standing side bend - R", 25, "Reach right arm overhead and lean left."],
        ["Child's pose with reach", 30, "Kneel, sit back, reach arms forward."],
        ["Child's pose with reach", 30, "Kneel, sit back, reach arms forward."],
        ["Scapula push-ups", 45, "Plank position, let chest sink, then push back up."]
      ]
    },
    {
      id: 'arms',
      label: 'Arms & Wrists',
      quick: [
        ["Wrist circles", 30, "Roll wrists in smooth, continuous circles."],
        ["Wrist lean stretch", 30, "On all fours, lean weight forward over palms."],
        ["Prayer stretch", 30, "Press palms together in front of chest, lower hands slowly."]
      ],
      focused: [
        ["Wrist circles", 40, "Roll wrists in smooth, continuous circles."],
        ["Wrist lean stretch", 25, "On all fours, lean weight forward over palms."],
        ["Wrist lean stretch", 25, "On all fours, lean weight forward over palms."],
        ["Reverse wrist stretch", 20, "Backs of hands on floor, lean back slightly."],
        ["Reverse wrist stretch", 20, "Backs of hands on floor, lean back slightly."],
        ["Prayer stretch", 20, "Press palms together, lower hands slowly."],
        ["Prayer stretch", 20, "Press palms together, lower hands slowly."],
        ["Forearm extensor stretch - L", 20, "Extend left arm, gently push back of hand."],
        ["Forearm extensor stretch - R", 20, "Extend right arm, gently push back of hand."]
      ]
    },
    {
      id: 'core',
      label: 'Core & Spine',
      quick: [
        ["Cat-cow movement", 40, "On all fours, arch back up, then let belly drop."],
        ["Thoracic rotation - Left", 25, "On all fours, place left hand behind head and rotate elbow up."],
        ["Thoracic rotation - Right", 25, "On all fours, place right hand behind head and rotate elbow up."],
        ["Cobra stretch", 30, "Lie on stomach and press chest up gently."]
      ],
      focused: [
        ["Cat-cow movement", 40, "On all fours, arch back up, then let belly drop."],
        ["Thoracic rotation stretch - L", 30, "Hand behind head, rotate elbow up."],
        ["Thoracic rotation stretch - R", 30, "Hand behind head, rotate elbow up."],
        ["Cobra stretch", 25, "Lie on stomach and press chest up gently."],
        ["Cobra stretch", 25, "Lie on stomach and press chest up gently."],
        ["Hollow body breathing", 20, "Lie on back, press lower back into floor, elevate legs."],
        ["Hollow body breathing", 20, "Lie on back, press lower back into floor, elevate legs."]
      ]
    },
    {
      id: 'hips',
      label: 'Hips & Glutes',
      quick: [
        ["Deep squat hold", 40, "Drop into low squat, keep heels flat and chest up."],
        ["Hip flexor stretch - Left", 30, "Kneel on right knee, shift weight forward into left foot."],
        ["Hip flexor stretch - Right", 30, "Kneel on left knee, shift weight forward into right foot."],
        ["Seated figure-4 stretch - Left", 30, "Cross left ankle over right knee and lean forward."],
        ["Seated figure-4 stretch - Right", 30, "Cross right ankle over left knee and lean forward."]
      ],
      focused: [
        ["Hip circles", 40, "Stand and make large, slow circles with pelvis."],
        ["Hip flexor stretch - L", 30, "Kneel on right knee, shift weight forward."],
        ["Hip flexor stretch - R", 30, "Kneel on left knee, shift weight forward."],
        ["Seated figure-4 stretch - L", 30, "Cross left ankle over right knee, press down."],
        ["Seated figure-4 stretch - R", 30, "Cross right ankle over left knee, press down."],
        ["Seated adductor stretch - L", 30, "Legs wide, bend left leg in, lean forward."],
        ["Seated adductor stretch - R", 30, "Legs wide, bend right leg in, lean forward."],
        ["Deep squat hold", 35, "Drop into low squat, heels flat."],
        ["Deep squat hold", 35, "Drop into low squat, heels flat."]
      ]
    },
    {
      id: 'legs',
      label: 'Legs & Feet',
      quick: [
        ["Relaxed forward fold", 40, "Stand, bend at hips, let upper body hang heavy."],
        ["Quad stretch - Left", 25, "Stand on right leg, pull left heel to glute."],
        ["Quad stretch - Right", 25, "Stand on left leg, pull right heel to glute."],
        ["Ankle mobility rocks - Left", 25, "Half-kneeling, drive left knee over toes without lifting heel."],
        ["Ankle mobility rocks - Right", 25, "Half-kneeling, drive right knee over toes without lifting heel."],
        ["Toe extension stretch", 30, "Kneel with toes tucked under, sit back on heels."]
      ],
      focused: [
        ["Standing hamstring stretch - L", 30, "Left heel forward, hinge at hips."],
        ["Standing hamstring stretch - R", 30, "Right heel forward, hinge at hips."],
        ["Quad stretch - L", 30, "Stand on right leg, pull left heel to glute."],
        ["Quad stretch - R", 30, "Stand on left leg, pull right heel to glute."],
        ["Calf stretch against wall - L", 30, "Left foot back, press heel into floor."],
        ["Calf stretch against wall - R", 30, "Right foot back, press heel into floor."],
        ["Ankle circles", 40, "Lift foot slightly, roll ankle in circles."],
        ["Ankle mobility rocks - L", 30, "Half-kneeling, drive left knee over toes without lifting heel."],
        ["Ankle mobility rocks - R", 30, "Half-kneeling, drive right knee over toes without lifting heel."],
        ["Toe extension stretch", 20, "Kneel with toes tucked under, sit back on heels."],
        ["Toe flexion stretch", 20, "Kneel with feet flat on floor, sit back on heels."],
        ["Dead hang (optional)", 25, "Hang passively from a pull-up bar."],
        ["Dead hang (optional)", 25, "Hang passively from a pull-up bar."],
        ["Relaxed forward fold", 30, "Stand, bend at hips, let upper body hang heavy."],
        ["Relaxed forward fold", 30, "Stand, bend at hips, let upper body hang heavy."]
      ]
    }
  ];

  // --- Audio Engine & Volume Safety Lock ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  function playSound(type) {
    const style = document.getElementById('soundOption').value;
    const volume = parseFloat(document.getElementById('volumeSlider').value);
    
    if (style === 'none' || volume === 0) return;
    
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(audioCtx.destination);
    
    osc.type = style === 'digital' ? 'square' : style === 'soft' ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(type === 'end' ? 1046.50 : 523.25, audioCtx.currentTime);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    
    const duration = type === 'end' ? 0.6 : 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    
    osc.start(); 
    osc.stop(audioCtx.currentTime + duration + 0.1);
  }

  // Volume Auto-Lock Logic
  const volLockBtn = document.getElementById('volLockBtn');
  const volSlider = document.getElementById('volumeSlider');
  let volLockTimer;

  function lockVolume() {
    volSlider.disabled = true;
    volLockBtn.textContent = '🔒';
    volLockBtn.classList.remove('unlocked');
  }

  function resetVolLockTimer() {
    clearTimeout(volLockTimer);
    volLockTimer = setTimeout(lockVolume, 5000); 
  }

  volLockBtn.onclick = () => {
    if (volSlider.disabled) {
      volSlider.disabled = false;
      volLockBtn.textContent = '🔓';
      volLockBtn.classList.add('unlocked');
      resetVolLockTimer();
    } else {
      lockVolume();
      clearTimeout(volLockTimer);
    }
  };

  volSlider.addEventListener('input', () => {
    playSound('tick'); 
    resetVolLockTimer();
  });

  // --- State ---
  let sequence = [];
  let currentIndex = -1; 
  let timeLeft = 10;
  let elapsedTotal = 0;
  let timer = null;
  let isPaused = false;

  // --- Generate UI ---
  const sectionsList = document.getElementById('sectionsList');
  workoutData.forEach(cat => {
    const row = document.createElement('div');
    row.className = 'category-row';
    row.innerHTML = `
      <div class="cat-label">${cat.label}</div>
      <div class="cat-chips">
        <div class="chip" data-cat="${cat.id}" data-mode="quick">Quick</div>
        <div class="chip" data-cat="${cat.id}" data-mode="focused">Focused</div>
      </div>
    `;
    sectionsList.appendChild(row);
  });

  sectionsList.addEventListener('click', (e) => {
    if (e.target.classList.contains('chip')) {
      const isActive = e.target.classList.contains('active');
      
      const siblings = e.target.parentElement.querySelectorAll('.chip');
      siblings.forEach(s => s.classList.remove('active'));

      if (!isActive) e.target.classList.add('active');

      buildSequence();
    }
  });

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const rs = s % 60;
    return `${m}:${rs.toString().padStart(2, '0')}`;
  }

  function buildSequence() {
    let activeExercises = [];

    workoutData.forEach(cat => {
      const activeChip = document.querySelector(`.chip[data-cat="${cat.id}"].active`);
      if (activeChip) {
        activeExercises = activeExercises.concat(cat[activeChip.dataset.mode]);
      }
    });

    sequence = [];
    
    for (let i = 0; i < activeExercises.length; i++) {
      const [name, dur, desc] = activeExercises[i];
      sequence.push({ name, dur, isRest: false, desc });
      
      if (i < activeExercises.length - 1) {
        const nextName = activeExercises[i+1][0];
        
        // Smart transition logic
        const isSameExercise = (name === nextName);
        
        // Check if we are merely switching from Left to Right (or vice versa)
        const baseCurrent = name.replace(/ - (Left|Right|L|R)$/, '');
        const baseNext = nextName.replace(/ - (Left|Right|L|R)$/, '');
        const isSideSwitch = (baseCurrent === baseNext) && (name !== nextName);
        
        let restDur = 10;
        let restDesc = "Transition. Take a deep breath and move into position for the next stretch.";
        
        if (isSameExercise) {
          restDur = 5;
          restDesc = "Brief pause. Shake it out, then go slightly deeper for set two.";
        } else if (isSideSwitch) {
          restDur = 5;
          restDesc = "Quickly switch to the other side.";
        }
        
        sequence.push({ 
          name: "Rest", 
          dur: restDur, 
          isRest: true, 
          desc: restDesc
        });
      }
    }

    const total = sequence.reduce((acc, curr) => acc + curr.dur, 0) + (sequence.length > 0 ? 10 : 0);
    document.getElementById('statTotal').textContent = formatTime(total);
    document.getElementById('statRemaining').textContent = formatTime(total);
    
    if (sequence.length === 0) {
      document.getElementById('setupEstTime').textContent = "Total Est. Time: 0:00";
      document.getElementById('currentName').textContent = "Select areas to begin";
      document.getElementById('currentDesc').textContent = "Go to Setup to build your routine.";
      document.getElementById('currentTime').textContent = "00:00";
    } else {
      document.getElementById('setupEstTime').textContent = `Total Est. Time: ${formatTime(total)}`;
    }
    
    document.getElementById('startBtn').disabled = sequence.length === 0;

    renderPlanned();
    updateNextIndicator();
  }

  function renderPlanned() {
    document.getElementById('planned').innerHTML = sequence.map((ex, i) => {
      let badgeClass = 'badge-work';
      let badgeText = 'WORK';
      let nameStyle = 'color: var(--text); font-weight: 600;';
      
      if (ex.isRest) {
        badgeClass = 'badge-rest';
        badgeText = 'REST';
        nameStyle = 'color: var(--rest); font-weight: 600;';
      }

      return `
      <div class="queue-item ${i === currentIndex ? 'active' : ''} ${i < currentIndex ? 'done' : ''}" id="item-${i}">
        <div style="display:flex; align-items:center;">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <span style="${nameStyle}">${ex.name}</span>
        </div>
        <div class="muted" style="font-weight: bold; color: var(--text);">${formatTime(ex.dur)}</div>
      </div>`;
    }).join('');

    if (currentIndex >= 0 && timer) {
      const activeEl = document.getElementById(`item-${currentIndex}`);
      if (activeEl) {
         setTimeout(() => {
            activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
         }, 50);
      }
    }
  }

  function updateNextIndicator() {
    const box = document.getElementById('upcomingBox');
    
    if (sequence.length === 0) {
      box.textContent = "Up Next: --";
      return;
    }

    let nextExercises = [];
    let startIndex = currentIndex === -1 ? 0 : currentIndex + 1;
    
    for (let i = startIndex; i < sequence.length; i++) {
      let item = sequence[i];
      if (!item.isRest) {
        nextExercises.push(`<b>${item.name}</b> <span style="opacity:0.8; font-size:0.9em;">(${formatTime(item.dur)})</span>`);
        if (nextExercises.length >= 2) break;
      }
    }
    
    if (nextExercises.length === 0) {
      box.innerHTML = "Up Next: Workout Complete!";
    } else if (nextExercises.length === 1) {
      box.innerHTML = `<div style="color:var(--accent); margin-bottom:5px;">Up Next:</div>
                       <div style="color:var(--text);">${nextExercises[0]}</div>`;
    } else {
      box.innerHTML = `<div style="color:var(--accent); margin-bottom:5px;">Up Next:</div>
                       <div style="color:var(--text); margin-bottom:4px;">${nextExercises[0]}</div>
                       <div style="color:var(--text); font-size:0.85em; opacity:0.7;">Then: ${nextExercises[1]}</div>`;
    }
  }

  function tick() {
    if (isPaused) return;
    
    timeLeft--;
    elapsedTotal++;

    if (timeLeft <= 3 && timeLeft > 0) playSound('tick');
    if (timeLeft <= 0) moveToNext();
    else updateUI();
  }
  
  function moveToNext() {
    playSound('end');
    currentIndex++;
    if (currentIndex < sequence.length) {
      timeLeft = sequence[currentIndex].dur;
      updateUI();
    } else {
      clearInterval(timer);
      alert("Session Complete! Great job.");
      reset();
    }
  }

  function updateUI() {
    const isPrep = currentIndex === -1;
    const currentItem = isPrep ? null : sequence[currentIndex];
    
    const panel = document.getElementById('timerPanel');
    panel.classList.remove('is-preparing', 'is-resting');
    
    if (isPrep) {
        panel.classList.add('is-preparing');
    } else if (currentItem.isRest) {
        panel.classList.add('is-resting');
    }

    document.getElementById('currentName').textContent = isPrep ? "GET READY" : currentItem.name;
    document.getElementById('currentDesc').textContent = isPrep ? "Find a clear space and get comfortable before the timer starts." : currentItem.desc;
    document.getElementById('currentTime').textContent = formatTime(timeLeft);
    
    const totalDuration = sequence.reduce((acc, curr) => acc + curr.dur, 0) + 10;
    const remaining = totalDuration - elapsedTotal;
    
    document.getElementById('statElapsed').textContent = formatTime(elapsedTotal);
    document.getElementById('statRemaining').textContent = formatTime(Math.max(0, remaining));

    const stepTotal = isPrep ? 10 : currentItem.dur;
    const progress = ((stepTotal - timeLeft) / stepTotal) * 100;
    document.getElementById('progressBar').style.width = `${progress}%`;
    
    renderPlanned();
    updateNextIndicator();
  }

  function start() {
    if (sequence.length === 0) {
      switchTab('setup');
      return alert("Select at least one Target Area to begin!");
    }
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    switchTab('workout');
    
    currentIndex = -1;
    timeLeft = 10;
    elapsedTotal = 0;
    
    document.getElementById('startBtn').disabled = true;
    document.getElementById('pauseBtn').disabled = false;
    document.getElementById('skipBtn').disabled = false;
    document.getElementById('stopBtn').disabled = false;
    
    updateUI();
    timer = setInterval(tick, 1000);
  }

  function skip() {
    if (currentIndex >= -1) elapsedTotal += timeLeft;
    if (isPaused) {
      isPaused = false;
      document.getElementById('pauseBtn').textContent = "Pause";
    }
    moveToNext();
  }

  function reset() {
    clearInterval(timer);
    timer = null;
    currentIndex = -1;
    elapsedTotal = 0;
    isPaused = false;
    
    document.getElementById('startBtn').disabled = false;
    document.getElementById('pauseBtn').disabled = true;
    document.getElementById('skipBtn').disabled = true;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('pauseBtn').textContent = "Pause";
    
    const panel = document.getElementById('timerPanel');
    panel.classList.remove('is-preparing', 'is-resting');
    document.getElementById('progressBar').style.width = `0%`;
    document.getElementById('currentName').textContent = "Select areas to begin";
    document.getElementById('currentDesc').textContent = "Go to Setup to build your routine.";
    document.getElementById('currentTime').textContent = "00:00";
    
    buildSequence(); 
  }

  // Event Listeners
  document.getElementById('startBtn').onclick = start;
  document.getElementById('stopBtn').onclick = reset;
  document.getElementById('skipBtn').onclick = skip;
  document.getElementById('pauseBtn').onclick = () => {
    isPaused = !isPaused;
    document.getElementById('pauseBtn').textContent = isPaused ? "Resume" : "Pause";
  };

  // --- ACCIDENTAL LEAVE PROTECTION ---
  window.addEventListener('beforeunload', function (e) {
    if (sequence.length > 0 && timer) { 
      e.preventDefault();
      e.returnValue = ''; 
    }
  });

  history.pushState({ page: 1 }, document.title, location.href);

  window.addEventListener('popstate', function (e) {
    if (sequence.length > 0 && timer) {
      let wasRunning = false;
      if (!isPaused) {
        wasRunning = true;
        isPaused = true;
        document.getElementById('pauseBtn').textContent = "Resume";
      }

      const confirmLeave = confirm("You have an active session. Are you sure you want to leave and lose your progress?");
      
      if (confirmLeave) {
        sequence = []; 
        clearInterval(timer);
        history.back(); 
      } else {
        history.pushState({ page: 1 }, document.title, location.href);
        if (wasRunning) {
          isPaused = false;
          document.getElementById('pauseBtn').textContent = "Pause";
        }
      }
    } else {
      history.back();
    }
  });

</script>
</body>
</html>
